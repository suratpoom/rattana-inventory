<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d2b5e">
<title>รัตนมาร์ท — ระบบค้นหาสินค้า v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d2b5e;--navy2:#1a3a6b;--navy3:#0a1f47;
  --gold:#c9a84c;--gold2:#f0c040;--gold3:#a07830;
  --white:#ffffff;--light:#f4f6fb;--border:#d0daf0;
  --text:#0d2b5e;--muted:#5a7099;
  --red:#c0392b;--green:#1a7a4a;
  --radius:14px;--rsm:8px;
}
html,body{height:100%;background:var(--light)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Sarabun,sans-serif;color:var(--text);overflow:hidden}
#app{height:100vh;overflow:hidden}
.screen{display:none;flex-direction:column;height:100vh;background:var(--light)}
.screen.active{display:flex}
.topbar{background:var(--navy);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top))}
.topbar-logo{width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0}
.topbar-logo img{width:36px;height:36px;object-fit:cover}
.topbar-title{color:var(--white);font-size:17px;font-weight:700;flex:1}
.topbar-sub{color:var(--gold2);font-size:11px;opacity:.85}
.topbar-back{background:none;border:none;cursor:pointer;padding:4px;display:flex}
.topbar-back svg{width:22px;height:22px;fill:var(--gold2)}
.user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(240,192,64,.3);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.chip-name{color:var(--gold2);font-size:11px;font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role-badge{background:var(--gold2);color:var(--navy);font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;position:relative}
#s-login{background:var(--navy)}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px}
.login-logo-img{width:180px;height:180px;border-radius:24px;object-fit:cover;margin-bottom:24px}
.login-card{background:var(--white);border-radius:var(--radius);padding:24px;width:100%;max-width:380px}
.field-label{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px;display:block}
.field-input{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:12px 14px;font-size:15px;color:var(--text);background:var(--white);outline:none;transition:border .2s;margin-bottom:14px}
.field-input:focus{border-color:var(--navy2)}
.login-btn{width:100%;background:var(--navy);color:var(--gold2);border:none;border-radius:var(--rsm);padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:18px;font-weight:500}
.login-msg{color:var(--muted);font-size:13px;margin-top:8px;text-align:center;min-height:18px}

/* Search */
.search-box{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px}
.search-row{display:flex;gap:10px;align-items:center}
.search-input-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-input{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:11px 36px 11px 13px;font-size:15px;color:var(--text);background:var(--light);outline:none}
.search-input:focus{border-color:var(--navy2);background:var(--white)}
.clear-btn{position:absolute;right:10px;background:none;border:none;cursor:pointer;padding:4px;display:none;align-items:center;justify-content:center}
.clear-btn.visible{display:flex}
.clear-btn svg{width:16px;height:16px;fill:var(--muted)}
.scan-btn{background:var(--navy);border:none;border-radius:var(--rsm);padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--gold2);font-size:13px;font-weight:600;flex-shrink:0}
.scan-btn svg{width:18px;height:18px;fill:var(--gold2)}
.search-hint{font-size:12px;color:var(--muted);margin-top:8px}
.sbar{background:var(--white);border-radius:var(--rsm);border:1px solid var(--border);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;min-height:40px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sdot.loading{background:var(--gold3);animation:pulse 1s infinite}
.sdot.ok{background:var(--green)}
.sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* FAB scroll-to-top — แก้ไขปัญหา floating button กด ── V2 */
.fab-top{
  position:fixed;bottom:28px;right:20px;
  width:52px;height:52px;
  background:var(--navy);border:2px solid var(--gold2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(13,43,94,.35);
  opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;
  transform:translateY(8px);
  z-index:999;
}
.fab-top.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
.fab-top svg{width:22px;height:22px;fill:var(--gold2)}
.fab-top:active{transform:scale(.92)}

/* List */
.result-count{font-size:13px;color:var(--muted);margin-bottom:10px;padding:0 2px}
.list-item{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;cursor:pointer;margin-bottom:10px;transition:border-color .15s}
.list-item:active{border-color:var(--navy2);background:#f0f4fb}
.list-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.lthumb{width:56px;height:56px;border-radius:10px;background:#f0f4fa;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border)}
.lthumb svg{width:24px;height:24px;fill:#c0cce0}
.lthumb img{width:56px;height:56px;object-fit:contain;border-radius:10px}
.lname{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:2px;line-height:1.3}
.lsku{font-size:11px;color:var(--muted)}
.lchev{width:16px;height:16px;fill:var(--border);flex-shrink:0;margin-left:auto}
.exact-badge{display:inline-block;background:#e0f0e8;color:var(--green);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.list-price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-top:1px solid var(--light);padding-top:10px}
.lpc{background:var(--light);border-radius:6px;padding:7px 6px;text-align:center}
.lpc:first-child{background:var(--navy)}
.lpl{font-size:9px;color:var(--muted);margin-bottom:3px;font-weight:600;text-transform:uppercase}
.lpc:first-child .lpl{color:rgba(240,192,64,.8)}
.lpv{font-size:13px;font-weight:700;color:var(--navy)}
.lpc:first-child .lpv{color:var(--gold2)}
.list-stock-row{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:8px}
.stock-label{font-size:11px;color:var(--muted)}
.stock-num{font-size:13px;font-weight:600;color:var(--navy)}

/* Detail */
.result-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.result-img-wrap{width:100%;height:240px;background:#f0f4fa;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.result-img{width:100%;height:240px;object-fit:contain;display:block}
.result-img-ph{width:100%;height:180px;background:#f0f4fa;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.result-img-ph svg{width:52px;height:52px;fill:#c0cce0}
.result-body{padding:18px}
.result-name{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:2px;line-height:1.3}
.result-short{font-size:13px;color:var(--muted);margin-bottom:4px}
.result-sku{font-size:12px;color:var(--muted);margin-bottom:10px}
.result-cat{display:inline-block;background:#e8edf8;color:var(--navy2);font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;margin-right:4px;margin-bottom:4px}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px;display:flex;align-items:center;gap:6px}
.section-title svg{width:14px;height:14px;flex-shrink:0}
.price-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px}
.price-table th{background:var(--navy);color:var(--gold2);padding:8px 6px;text-align:center;font-size:10px;font-weight:600}
.price-table th:first-child{text-align:left;border-radius:var(--rsm) 0 0 0;padding-left:10px}
.price-table th:last-child{border-radius:0 var(--rsm) 0 0}
.price-table td{padding:9px 6px;border-bottom:1px solid var(--light);text-align:center;color:var(--navy);font-weight:500}
.price-table td:first-child{text-align:left;color:var(--muted);font-weight:400;font-size:11px;padding-left:10px}
.price-table tr:last-child td{border-bottom:none}
.price-table tr:nth-child(even) td{background:#f8faff}
.cc00-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px}
.cc00-table th{background:#8a4a00;color:var(--white);padding:8px 6px;text-align:center;font-size:10px;font-weight:600}
.cc00-table th:first-child{text-align:left;border-radius:var(--rsm) 0 0 0;padding-left:10px}
.cc00-table th:last-child{border-radius:0 var(--rsm) 0 0}
.cc00-table td{padding:9px 6px;border-bottom:1px solid #fff4e8;text-align:center;color:#8a4a00;font-weight:600}
.cc00-table td:first-child{text-align:left;color:var(--muted);font-weight:400;font-size:11px;padding-left:10px}
.cc00-table tr:last-child td{border-bottom:none}
.lock-box{background:#fff4e8;border:1px solid #e8a020;border-radius:var(--rsm);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.lock-box svg{width:22px;height:22px;fill:#e8a020;flex-shrink:0}
.lock-text{font-size:13px;color:#8a4a00;font-weight:500}
.lock-sub{font-size:11px;color:#b87030;margin-top:2px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--light)}
.info-row:last-child{border-bottom:none}
.ik{font-size:13px;color:var(--muted);flex-shrink:0;margin-right:12px}
.iv{font-size:13px;font-weight:500;color:var(--navy);text-align:right;word-break:break-all}
.iv.mono{font-family:monospace;font-size:12px}

/* ── Fuzzy search / คุณหมายถึง? ── */
.fuzzy-box{background:#fffbe8;border:1px solid #f0d060;border-radius:var(--rsm);padding:12px 14px;margin-bottom:10px}
.fuzzy-label{font-size:12px;color:#8a6a00;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fuzzy-label svg{width:14px;height:14px;fill:#c09000}
.fuzzy-chips{display:flex;flex-wrap:wrap;gap:6px}
.fuzzy-chip{background:var(--white);border:1.5px solid #e0c040;border-radius:20px;padding:5px 13px;font-size:13px;color:var(--navy);cursor:pointer;font-weight:500;transition:background .15s}
.fuzzy-chip:active{background:#fff8d0}

.scanner-wrap{background:var(--navy3);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;position:relative}
/* reader div ถูก inject โดย html5-qrcode */
#html5-qr-reader{width:100%;border-radius:0!important;border:none!important}
#html5-qr-reader video{width:100%!important;object-fit:cover;display:block}
#html5-qr-reader img{display:none!important}
/* ซ่อน built-in UI ที่ไม่ต้องการ */
#html5-qr-reader__dashboard{display:none!important}
#html5-qr-reader__header_message{display:none!important}
/* Custom overlay ทับบน reader */
.scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10}
.scanner-frame{width:260px;height:130px;border-radius:14px;position:relative}
.scanner-line{position:absolute;left:10px;right:10px;height:2px;background:var(--gold2);opacity:.85;animation:scanline 1.8s ease-in-out infinite}
@keyframes scanline{0%{top:6px;opacity:1}50%{top:114px;opacity:.6}100%{top:6px;opacity:1}}
.scan-corner{position:absolute;width:20px;height:20px;border-color:var(--gold2);border-style:solid;border-width:0}
.sc-tl{top:-2px;left:-2px;border-top-width:3px;border-left-width:3px;border-top-left-radius:5px}
.sc-tr{top:-2px;right:-2px;border-top-width:3px;border-right-width:3px;border-top-right-radius:5px}
.sc-bl{bottom:-2px;left:-2px;border-bottom-width:3px;border-left-width:3px;border-bottom-left-radius:5px}
.sc-br{bottom:-2px;right:-2px;border-bottom-width:3px;border-right-width:3px;border-bottom-right-radius:5px}
.scan-zone-dim{position:absolute;inset:0;background:rgba(0,0,0,.45);pointer-events:none;z-index:9}
.scanner-controls{display:flex;gap:8px;margin-bottom:10px}
.stop-btn{background:var(--red);color:var(--white);border:none;border-radius:var(--rsm);padding:13px;font-size:14px;font-weight:600;cursor:pointer;flex:1}
.torch-btn{background:var(--navy2);color:var(--gold2);border:2px solid rgba(240,192,64,.3);border-radius:var(--rsm);padding:13px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0}
.torch-btn svg{width:18px;height:18px;fill:var(--gold2)}
.torch-btn.on{background:var(--gold3);border-color:var(--gold2)}
.scanner-hint{background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:10px;text-align:center;font-size:13px;color:var(--muted)}
.manual-row{display:flex;gap:8px;margin-bottom:12px}
.manual-input{flex:1;border:1.5px solid var(--border);border-radius:var(--rsm);padding:11px 13px;font-size:15px;outline:none;background:var(--white);color:var(--text)}
.manual-btn{background:var(--navy);color:var(--gold2);border:none;border-radius:var(--rsm);padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer}

/* สถานะ scanner */
.scan-status{background:var(--white);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;min-height:42px}
.scan-ready{background:#f0fff6;border-color:#a0d8b0;color:var(--green)}
.scan-err-box{background:#fff0f0;border-color:#f0a0a0;color:var(--red)}

/* ── logout ── */
.logout-row{display:flex;justify-content:center;padding:16px 0 80px}
.logout-btn{background:none;border:1.5px solid var(--border);border-radius:20px;padding:9px 28px;font-size:13px;color:var(--muted);cursor:pointer;display:block;margin:0 auto}
.logout-btn:active{background:var(--light)}
/* ปุ่มเบิก/สั่ง — เล็ก inline ข้างชื่อสินค้า */
.req-mini-wrap{display:flex;flex-direction:column;gap:5px;flex-shrink:0;margin-left:8px}
.req-mini-btn{border:none;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.req-mini-btn svg{width:13px;height:13px;flex-shrink:0}
.btn-beik{background:#fff4e8;color:#8a4a00;border:1.5px solid #e8a020}
.btn-sang{background:var(--navy);color:var(--gold2)}
.btn-beik:active{background:#ffecd0}
.btn-sang:active{background:var(--navy2)}
.req-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:flex-end}
.req-overlay.open{display:flex}
.req-sheet{background:var(--white);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:520px;margin:0 auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.req-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;display:block}
.req-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.req-product{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.4}
.req-type-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.req-type-btn{border:2px solid var(--border);border-radius:var(--rsm);padding:14px;font-size:15px;font-weight:700;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s;text-align:center}
.req-type-btn.active.beik{border-color:#e8a020;background:#fff4e8;color:#8a4a00}
.req-type-btn.active.sang{border-color:var(--navy);background:var(--navy);color:var(--gold2)}
.req-qty-row{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.req-qty-label{font-size:13px;font-weight:600;color:var(--navy);flex-shrink:0}
.req-qty-minus,.req-qty-plus{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--white);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--navy);flex-shrink:0}
.req-qty-minus:active,.req-qty-plus:active{background:var(--light)}
.req-qty-input{flex:1;border:2px solid var(--border);border-radius:var(--rsm);padding:10px;font-size:22px;font-weight:700;text-align:center;color:var(--navy);outline:none}
.req-qty-input:focus{border-color:var(--navy2)}
.req-unit{font-size:13px;color:var(--muted);flex-shrink:0}
.req-submit{width:100%;padding:15px;border:none;border-radius:var(--rsm);font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:opacity .15s}
.req-submit:disabled{opacity:.4;cursor:not-allowed}
.req-cancel{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--rsm);font-size:14px;color:var(--muted);background:none;cursor:pointer}
.req-msg{font-size:13px;text-align:center;min-height:20px;margin-bottom:8px;font-weight:500}

</style>
</head>
<body>
<div id="app">

<!-- ── LOGIN ── -->
<div id="s-login" class="screen active">
  <div class="login-wrap">
    <img class="login-logo-img"
      src="https://lh3.googleusercontent.com/d/1BVFXkoVvXYHpkk1aNNc79kgUoBWbl2h8"
      onerror="this.style.display='none'"
      alt="Rattana Mart">
    <div class="login-card">
      <label class="field-label">Username</label>
      <input class="field-input" id="inp-user" type="text" autocomplete="username" autocapitalize="none" placeholder="ชื่อผู้ใช้">
      <label class="field-label">Password</label>
      <input class="field-input" id="inp-pw" type="password" autocomplete="current-password" placeholder="รหัสผ่าน">
      <button class="login-btn" id="login-btn">เข้าสู่ระบบ</button>
      <div class="login-err" id="login-err"></div>
      <div class="login-msg" id="login-msg"></div>
    </div>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="s-main" class="screen">
  <div class="topbar">
    <div class="topbar-logo">
      <img src="https://lh3.googleusercontent.com/d/1BVFXkoVvXYHpkk1aNNc79kgUoBWbl2h8" onerror="this.style.display='none'" alt="">
    </div>
    <div style="flex:1;min-width:0">
      <div class="topbar-title">รัตนมาร์ท</div>
      <div class="topbar-sub">ระบบค้นหาสินค้า v2</div>
    </div>
    <div class="user-chip">
      <span class="chip-name" id="chip-name"></span>
      <span class="role-badge" id="chip-role"></span>
    </div>
  </div>
  <div class="content" id="main-content">
    <div class="search-box">
      <div class="search-row">
        <div class="search-input-wrap">
          <input class="search-input" id="search-input" type="text" inputmode="search"
            placeholder="ค้นหาชื่อ, บาร์โค้ด, แบรนด์..." autocomplete="off">
          <button class="clear-btn" id="clear-btn">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <button class="scan-btn" id="open-scanner">

/* ══ UTILS ══ */
function gviz(id,tab){return `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;}
async function fetchSheet(id,tab){
  const r=await fetch(gviz(id,tab));const t=await r.text();
  const j=JSON.parse(t.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
  const cols=j.table.cols.map(c=>c.label);
  return j.table.rows.map(row=>{const o={};cols.forEach((h,i)=>{o[h]=(row.c&&row.c[i]&&row.c[i].v!==null)?String(row.c[i].v).trim():'';});return o;});
}

function clearSearch(){

  const val=this.value;
  document.getElementById('clear-btn').classList.toggle('visible',val.length>0);
  clearTimeout(searchTimer);searchTimer=setTimeout(()=>doSearch(val),300);

function scoreResult(r,q){
  const name=(r['PRODUCT NAME']||'').toLowerCase();
  const short=(r['SHORT NAME']||'').toLowerCase();
  const codes=BC_COLS.map(k=>(r[k]||'').toLowerCase());
  if(codes.some(b=>b===q))return 100;
  if(codes.some(b=>b.endsWith(q)))return 80;
  if(name===q||short===q)return 70;
  if(name.startsWith(q)||short.startsWith(q))return 50;
  if(name.includes(q)||short.includes(q))return 30;
  for(const col of SEARCH_COLS){
    if(col==='PRODUCT NAME'||col==='SHORT NAME'||BC_COLS.includes(col))continue;
    const v=(r[col]||'').toLowerCase();
    if(v&&v.includes(q))return 15;
  }
  if(codes.some(b=>b.includes(q)))return 20;
  return 0;
}
function isExactBarcodeMatch(r,q){return BC_COLS.some(k=>(r[k]||'').trim()===q.trim());}

function doSearch(raw){
  if(!raw.trim()){clearSearch();return;}
  const rawTrimmed=raw.trim();
  const tokens=rawTrimmed.toLowerCase().split(/\s+/).filter(Boolean);
  const looksLikeBarcode=/^\d{4,}$/.test(rawTrimmed)&&tokens.length===1;

  let scored;
  if(tokens.length>1){
    /* Multi-token: ทุก token ต้องพบในสินค้า เช่น "โอเล โลชั่น" */
    scored=allData.map(r=>{
      const name=(r['PRODUCT NAME']||'').toLowerCase();
      const short=(r['SHORT NAME']||'').toLowerCase();
      const allText=SEARCH_COLS.map(k=>(r[k]||'').toLowerCase()).join(' ');
      const allMatch=tokens.every(t=>name.includes(t)||short.includes(t)||allText.includes(t));
      if(!allMatch)return{r,score:0};
      /* คำนวณ score: token ที่อยู่ในชื่อหลัก = คะแนนสูงกว่า */
      const score=tokens.reduce((acc,t)=>{
        if(name.startsWith(t)||short.startsWith(t))return acc+40;
        if(name.includes(t)||short.includes(t))return acc+20;
        return acc+5;
      },0);
      return{r,score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  } else {
    const q=tokens[0];
    scored=allData.map(r=>({r,score:scoreResult(r,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
    if(!scored.length){
      setStat('ไม่พบตรงๆ — กำลังค้นหาที่ใกล้เคียง...','loading');
      setTimeout(()=>{
        renderFuzzy(rawTrimmed);
        setStat('ไม่พบ "'+rawTrimmed+'" — แสดงสินค้าที่ใกล้เคียง','err');
      },80);
      return;
    }
    if(looksLikeBarcode&&isExactBarcodeMatch(scored[0].r,rawTrimmed)){
      const exact=scored.filter(x=>isExactBarcodeMatch(x.r,rawTrimmed));
      if(exact.length===1){setStat('พบ: '+exact[0].r['PRODUCT NAME'],'ok');showDetail(exact[0].r);return;}
    }
  }

  if(!scored.length){
    setStat('ไม่พบตรงๆ — กำลังค้นหาที่ใกล้เคียง...','loading');
    setTimeout(()=>{
      renderFuzzy(rawTrimmed);
      setStat('ไม่พบ "'+rawTrimmed+'" — แสดงสินค้าที่ใกล้เคียง','err');
    },80);
    return;
  }
  setStat('พบ '+scored.length+' รายการ — กดเพื่อเลือกสินค้า','ok');
  renderList(scored.map(x=>x.r),tokens[0]);
}

/* ══ IMAGE — V2: รองรับ Google Drive thumbnail ══ */
const NOIMG=`<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>`;

function extractDriveFileId(u){
  if(!u)return null;
  /* ล้าง whitespace และ quote ที่อาจมาจาก VLOOKUP */
  u=u.trim().replace(/^["']+|["']+$/g,'').trim();
  /* กรอง error ของ VLOOKUP */
  if(!u||u==='#N/A'||u==='#REF!'||u==='#VALUE!'||u.startsWith('#'))return null;
  /* เป็น File ID ตรงๆ (25-60 chars, ไม่มี slash) */
  if(/^[a-zA-Z0-9_-]{25,60}$/.test(u))return u;
  let m;
  if((m=u.match(/\/d\/([a-zA-Z0-9_-]{25,60})/)))return m[1];
  if((m=u.match(/[?&]id=([a-zA-Z0-9_-]{25,60})/)))return m[1];
  if((m=u.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]{25,60})/)))return m[1];
  /* thumbnail URL */
  if((m=u.match(/thumbnail\?id=([a-zA-Z0-9_-]{25,60})/)))return m[1];
  return null;
}

function getImg(r){
  /* ลองหา column IMAGE ในทุก case variant */
  const raw=(r['IMAGE']||r['image']||r['Image']||r['รูป']||r['รูปภาพ']||'').trim();
  if(!raw||raw==='#N/A'||raw.startsWith('#'))return null;
  const fileId=extractDriveFileId(raw);
  if(!fileId)return raw.startsWith('http')?raw:null;
  /* thumbnail API — เชื่อถือได้กับไฟล์ public, ไม่ต้อง login */
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
}

function getThumb(r){
  const raw=(r['IMAGE']||r['image']||r['Image']||r['รูป']||r['รูปภาพ']||'').trim();
  if(!raw||raw.startsWith('#'))return null;
  const fileId=extractDriveFileId(raw);
  if(!fileId)return null;
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w100`;
}

/* debug: แสดงค่า IMAGE column ที่ได้จริงใน detail — กด 3 ครั้งที่รูปเพื่อดู */
function debugImg(r){
  const raw=r['IMAGE']||r['image']||r['Image']||'(ไม่มีค่า)';
  const fid=extractDriveFileId(raw);

/* ══ RENDER LIST ══ */
function renderList(results,q){
  const area=document.getElementById('results-area');
  if(!results.length){area.innerHTML='<div class="sbar"><div class="sdot err"></div>&nbsp;ไม่พบสินค้าที่ค้นหา</div>';return;}
  let html=`<div class="result-count">พบ ${results.length} รายการ — กดเพื่อเลือกสินค้า</div>`;
  results.slice(0,100).forEach(r=>{
    const imgUrl=getThumb(r);
    const thumb=imgUrl
      ?`<img src="${imgUrl}" style="width:56px;height:56px;border-radius:10px;object-fit:contain" loading="lazy" onerror="this.style.display='none'">` 
      :NOIMG;
    const idx=allData.indexOf(r);
    const cat=[r['CAT GROUP'],r['CAT BRAND']].filter(Boolean).join(' · ');
    const isExact=q&&BC_COLS.some(k=>(r[k]||'').toLowerCase()===q);
    const badge=isExact?'<span class="exact-badge">ตรงทุกหลัก</span>':'';
    html+=`<div class="list-item" onclick="showDetail(allData[${idx}])">
      <div class="list-top">
        <div class="lthumb">${thumb}</div>
        <div style="flex:1;min-width:0">
          <div class="lname">${r['PRODUCT NAME']||'—'}${badge}</div>
          <div class="lsku">${r['CODE EA']?'CODE EA: '+r['CODE EA']:''}${cat?' · '+cat:''}</div>
        </div>
        <svg class="lchev" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </div>
      <div class="list-price-grid">
        <div class="lpc"><div class="lpl">EA</div><div class="lpv">${fmtPrice(r['PRICE CC03 EA'])}</div></div>
        <div class="lpc"><div class="lpl">PA</div><div class="lpv">${fmtPrice(r['PRICE CC03 PA'])}</div></div>
        <div class="lpc"><div class="lpl">BP</div><div class="lpv">${fmtPrice(r['PRICE CC03 BP'])}</div></div>
        <div class="lpc"><div class="lpl">CS</div><div class="lpv">${fmtPrice(r['PRICE CC03 CS'])}</div></div>
      </div>
      <div class="list-stock-row"><span class="stock-label">สต็อก C4:</span><span class="stock-num">${fmtStock(r['STOCK C4'])}</span></div>
    </div>`;
  });
  area.innerHTML=html;
}

/* ══ DETAIL ══ */
function showDetail(r){
  const canSeeCC00=currentUser&&currentUser.role>=CONFIG.ROLE_RESTRICTED;

/* ══════════════════════════════════════════════════
   SCANNER V2 — html5-qrcode (Android-optimized)
   ══════════════════════════════════════════════════
   ปัญหา V1: ZXing JS ไม่รองรับ Android Chrome ดี
   แก้ V2:
   1. ใช้ html5-qrcode ที่ใช้ BarcodeDetector native API บน Android
   2. Torch (ไฟฉาย) button สำหรับบาร์โค้ดมืด
   3. Vibration + beep เมื่อสแกนได้
   4. กดกลับ → auto clear search (FIX #4)
   ══════════════════════════════════════════════════ */

function setScanStatus(msg,type=''){
  const el=document.getElementById('scan-status');
  el.className='scan-status'+(type?' '+type:'');
  const dot=type==='ok'?'ok':type==='err'?'err':'loading';
  el.innerHTML=`<div class="sdot ${dot}"></div><span>${msg}</span>`;
  document.getElementById('scan-txt')&&(document.getElementById('scan-txt').textContent=msg);
}

/* beep ตอนสแกนได้ */
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='square';o.frequency.value=1200;
    g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.12);
  }catch(e){}
}
function vibrate(pattern=[80]){try{navigator.vibrate&&navigator.vibrate(pattern);}catch(e){}}

async function startScan(){
  setScanStatus('กำลังเปิดกล้อง...','');
  lastScanned='';scannerActive=true;torchOn=false;torchTrack=null;
  document.getElementById('torch-btn').classList.remove('on');

  if(typeof Html5Qrcode==='undefined'){
    setScanStatus('โหลดไลบรารีไม่ได้ — ใช้ช่องพิมพ์ด้านล่าง','err');return;
  }

  try{
    /* ขอ permission กล้องก่อน เพื่อ enumerate devices */
    await navigator.mediaDevices.getUserMedia({video:true}).then(s=>s.getTracks().forEach(t=>t.stop())).catch(()=>{});

    /* หาชื่อ camera หลัง (environment) */
    const devices=await Html5Qrcode.getCameras().catch(()=>[]);
    let camId=null;
    if(devices&&devices.length){
      /* prefer camera ที่มี "back" หรือ "environment" หรือตัวสุดท้าย */
      const back=devices.find(d=>/(back|rear|environment|0)/i.test(d.label));
      camId=(back||devices[devices.length-1]).id;
    }

    /* ล้าง reader เก่าก่อน */
    if(html5QrScanner){try{await html5QrScanner.stop();}catch(e){}html5QrScanner=null;}

    html5QrScanner=new Html5Qrcode('html5-qr-reader',{
      verbose:false,
      experimentalFeatures:{useBarCodeDetectorIfSupported:true} /* ใช้ native BarcodeDetector บน Android */
    });

    const config={
      fps:15,
      /* ไม่กำหนด qrbox เพื่อให้สแกนได้ทั้งหน้าจอ — แก้ปัญหาสแกนยาก */
      qrbox:{width:280,height:140},
      aspectRatio:1.5,
      formatsToSupport:[
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.CODE_93,
        Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.QR_CODE,
      ]
    };

    /* เลือก camera ที่ถูกต้อง */
    const cameraConfig=camId?{deviceId:{exact:camId}}:{facingMode:{exact:'environment'}};

    await html5QrScanner.start(
      cameraConfig,
      config,
      (decodedText)=>{
        /* สแกนได้! */
        if(!scannerActive||decodedText===lastScanned)return;
        lastScanned=decodedText;
        beep();vibrate([60,40,60]);
        onScanFound(decodedText);
      },
      (err)=>{/* scan error per frame - ignore */}
    );

    /* ดึง video track สำหรับ torch */
    setTimeout(()=>{
      try{
        const v=document.querySelector('#html5-qr-reader video');
        if(v&&v.srcObject){
          const tracks=v.srcObject.getVideoTracks();
          if(tracks.length&&tracks[0].getCapabilities&&tracks[0].getCapabilities().torch){
            torchTrack=tracks[0];
            document.getElementById('torch-btn').style.display='flex';
          }else{document.getElementById('torch-btn').style.display='none';}
        }
      }catch(e){document.getElementById('torch-btn').style.display='none';}
    },1000);

    setScanStatus('กล้องพร้อม — วางบาร์โค้ดให้อยู่ในกรอบสีทอง','ok');
    document.getElementById('scan-hint').textContent='พบปัญหา? ถอยห่างจากบาร์โค้ด 10-20 ซม. หรือพิมพ์เองด้านล่าง';

  }catch(e){
    let msg='เปิดกล้องไม่ได้ — ลองพิมพ์บาร์โค้ดด้านล่าง';
    if(e.name==='NotAllowedError'||String(e).includes('Permission'))
      msg='กรุณาอนุญาตกล้อง: Settings → Browser → Camera → Allow';
    else if(e.name==='NotFoundError')
      msg='ไม่พบกล้อง — ใช้ช่องพิมพ์ด้านล่างแทน';
    setScanStatus(msg,'err');
    document.getElementById('torch-btn').style.display='none';
  }
}

async function stopScan(){
  scannerActive=false;
  if(torchOn&&torchTrack){try{await torchTrack.applyConstraints({advanced:[{torch:false}]});}catch(e){}}
  torchOn=false;torchTrack=null;
  if(html5QrScanner){
    try{await html5QrScanner.stop();}catch(e){}
    try{html5QrScanner.clear();}catch(e){}
    html5QrScanner=null;
  }
  document.getElementById('manual-bc').value='';
}

/* torch toggle */
document.getElementById('torch-btn').onclick=async function(){
  if(!torchTrack)return;
  try{
    torchOn=!torchOn;
    await torchTrack.applyConstraints({advanced:[{torch:torchOn}]});
    this.classList.toggle('on',torchOn);
  }catch(e){this.style.display='none';}
};

function onScanFound(code){
  stopScan();
  show('s-main');
  /* V2 FIX #4: clear search ก่อนใส่บาร์โค้ดที่สแกนได้ */
  clearSearch();
  document.getElementById('search-input').value=code;
  document.getElementById('clear-btn').classList.add('visible');
  setStat('สแกนได้: '+code+' — กำลังค้นหา...','loading');
  const exact=allData.filter(r=>BC_COLS.some(k=>r[k]&&r[k].trim()===code.trim()));
  if(exact.length===1){setStat('พบ: '+exact[0]['PRODUCT NAME'],'ok');showDetail(exact[0]);}
  else if(exact.length>1){setStat('พบ '+exact.length+' รายการ — กรุณาเลือก','ok');renderList(exact,code.toLowerCase());}
  else{setStat('ไม่พบบาร์โค้ด '+code+' ในระบบ','err');document.getElementById('results-area').innerHTML=`<div class="sbar"><div class="sdot err"></div>&nbsp;ไม่พบบาร์โค้ด ${code} ในระบบ</div>`;}
}

/* ══ FUZZY SEARCH — Thai-aware ══
   รองรับการพิมพ์ผิด เช่น น้าดิ่ม → น้ำดื่ม
   1. normalize สระสั้น/ยาว และวรรณยุกต์
   2. Levenshtein distance
   3. แสดง "คุณหมายถึง?" chips
   ══════════════════════════════════════ */
function normalizeThai(s){
  return s
    .replace(/ำ/g,'า')           // น้ำ → น้า
    .replace(/[ึื]/g,'ิ')        // สระ อึ/อื → อิ
    .replace(/[ู]/g,'ุ')         // อู → อุ
    .replace(/[ี]/g,'ิ')         // อี → อิ
    .replace(/[็่้๊๋]/g,'')      // ตัดวรรณยุกต์/ไม้ไต่คู้
    .replace(/[ๆฯ]/g,'')
    .toLowerCase()
    .trim();
}
function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(!m)return n;if(!n)return m;
  const dp=[];
  for(let i=0;i<=m;i++){dp[i]=[i];for(let j=1;j<=n;j++)dp[i][j]=0;}
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function fuzzySearch(q){
  /* หา candidates ที่ใกล้เคียงที่สุด */
  const nq=normalizeThai(q);
  const maxDist=Math.max(2,Math.floor(nq.length*0.45));
  const scored=[];
  allData.forEach(r=>{
    const name=r['PRODUCT NAME']||'';
    const short=r['SHORT NAME']||'';
    const nn=normalizeThai(name);
    const ns=normalizeThai(short);
    /* ถ้า normalize แล้วมี substring ตรง — ถือว่าใกล้มาก */
    if(nn.includes(nq)||ns.includes(nq)){scored.push({r,dist:0,name});return;}
    /* ใช้ Levenshtein กับ window ขนาด nq.length บน string ชื่อสินค้า */
    let minDist=999;
    for(let i=0;i<=nn.length-nq.length+2;i++){
      const window=nn.substr(Math.max(0,i),nq.length+2);
      const d=levenshtein(nq,window);
      if(d<minDist)minDist=d;
    }
    if(minDist<=maxDist)scored.push({r,dist:minDist,name});
  });
  scored.sort((a,b)=>a.dist-b.dist);
  return scored.slice(0,8);
}
function renderFuzzy(q){
  const area=document.getElementById('results-area');
  const candidates=fuzzySearch(q);
  if(!candidates.length){
    area.innerHTML=`<div class="sbar"><div class="sdot err"></div>&nbsp;ไม่พบสินค้า "${q}" ในระบบ</div>`;
    return;
  }
  /* unique name chips */
  const seen=new Set();
  const chips=candidates.filter(c=>{
    const k=(c.r['PRODUCT NAME']||'').substr(0,30);
    if(seen.has(k))return false;seen.add(k);return true;
  });
  const chipsHtml=chips.map(c=>{
    const idx=allData.indexOf(c.r);
    return `<span class="fuzzy-chip" onclick="pickFuzzy(allData[${idx}],'${(c.r['PRODUCT NAME']||'').replace(/'/g,"&#39;")}')">${c.r['PRODUCT NAME']||'—'}</span>`;
  }).join('');
  area.innerHTML=`
    <div class="fuzzy-box">
      <div class="fuzzy-label">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        ไม่พบ "${q}" — คุณหมายถึง?
      </div>
      <div class="fuzzy-chips">${chipsHtml}</div>
    </div>`;
}
function pickFuzzy(r,name){
  /* เมื่อกด chip → ใส่ชื่อสินค้าใน search แล้วเปิด detail */
  document.getElementById('search-input').value=name;
  document.getElementById('clear-btn').classList.add('visible');
  showDetail(r);
}

function adjQty(d){
  const el=document.getElementById('req-qty');
  const v=Math.max(1,Math.min(9999,(parseInt(el.value)||0)+d));
  el.value=v;
}

async function submitRequest(){
  const qty=parseInt(document.getElementById('req-qty').value)||0;
  if(qty<1){
    document.getElementById('req-msg').textContent='กรุณาระบุจำนวนอย่างน้อย 1 ลัง';
    document.getElementById('req-msg').style.color='var(--red)';return;
  }
  if(!CONFIG.APPS_SCRIPT_URL){
    document.getElementById('req-msg').textContent='⚠️ ยังไม่ได้ตั้งค่า APPS_SCRIPT_URL — ดูคำแนะนำใน CONFIG';
    document.getElementById('req-msg').style.color='var(--red)';return;
  }

  const r=_curProd;
  const now=new Date();
  const date=now.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
  const time=now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  const payload={
    date,time,
    name:r?r['PRODUCT NAME']:'',
    codeEA:r?r['CODE EA']:'',
    qty,
    type:_reqType,
    user:currentUser?currentUser.name:''
  };

  document.getElementById('req-submit').disabled=true;
  document.getElementById('req-submit').textContent='กำลังส่ง...';
  document.getElementById('req-msg').textContent='';

  try{
    await fetch(CONFIG.APPS_SCRIPT_URL,{
      method:'POST',
      mode:'no-cors', /* Apps Script ต้องใช้ no-cors */
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    /* no-cors ไม่มี response body — ถือว่าสำเร็จ */
    document.getElementById('req-msg').textContent='✅ ส่งคำขอสำเร็จ!';
    document.getElementById('req-msg').style.color='var(--green)';
    document.getElementById('req-submit').textContent='ส่งแล้ว ✓';
    setTimeout(()=>closeReqModal(),1500);
  }catch(e){
    document.getElementById('req-msg').textContent='❌ ส่งไม่ได้ — ตรวจสอบ URL หรืออินเทอร์เน็ต';
    document.getElementById('req-msg').style.color='var(--red)';
    document.getElementById('req-submit').disabled=false;
    document.getElementById('req-submit').textContent='ลองอีกครั้ง';
  }
}

/* ปิด modal เมื่อกดนอก sheet */
document.getElementById('req-overlay').addEventListener('click',function(e){
  if(e.target===this)closeReqModal();
});


document.getElementById('inp-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('inp-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-pw').focus();});
document.getElementById('logout-btn').onclick=doLogout;
document.getElementById('detail-back').onclick=()=>{clearSearch();show('s-main');};

/* กดกลับจาก scanner → clear search V2 FIX #4 */
document.getElementById('scanner-back').onclick=async()=>{
  await stopScan();
  clearSearch(); /* ← FIX #4: auto-clear */
  show('s-main');
};
document.getElementById('stop-scan').onclick=async()=>{
  await stopScan();
  clearSearch(); /* ← FIX #4: auto-clear */
  show('s-main');
};

document.getElementById('open-scanner').onclick=()=>{show('s-scanner');startScan();};
document.getElementById('manual-search-btn').onclick=()=>{
  const v=document.getElementById('manual-bc').value.trim();
  if(v){stopScan();onScanFound(v);}
};
document.getElementById('manual-bc').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=e.target.value.trim();if(v){stopScan();onScanFound(v);}}
});

/* ══ BOOT ══ */
(function boot(){
  const saved=loadSession();
  if(saved&&saved.username&&saved.role){currentUser=saved;enterApp();}
  /* ซ่อน torch btn จนกว่าจะรู้ว่ากล้องรองรับ */
  document.getElementById('torch-btn').style.display='none';
})();
</script>
