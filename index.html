<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d2b5e">
<title>Rattana Mart — ระบบค้นหาสินค้า</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d2b5e;--navy2:#1a3a6b;--navy3:#0a1f47;
  --gold:#c9a84c;--gold2:#f0c040;--gold3:#a07830;
  --white:#ffffff;--light:#f4f6fb;--border:#d0daf0;
  --text:#0d2b5e;--muted:#5a7099;
  --red:#c0392b;--green:#1a7a4a;--orange:#d4700a;
  --radius:14px;--rsm:8px;
}
html,body{height:100%;background:var(--light)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Sarabun,sans-serif;color:var(--text);overflow:hidden}
#app{height:100vh;overflow:hidden}
.screen{display:none;flex-direction:column;height:100vh;background:var(--light)}
.screen.active{display:flex}
.topbar{background:var(--navy);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top))}
.topbar-logo{width:38px;height:38px;border-radius:8px;overflow:hidden;flex-shrink:0}
.topbar-logo img{width:38px;height:38px;object-fit:cover;border-radius:8px}
.topbar-title{color:var(--white);font-size:16px;font-weight:700;flex:1;line-height:1.2}
.topbar-sub{color:var(--gold2);font-size:10px;opacity:.85}
.topbar-back{background:none;border:none;cursor:pointer;padding:4px;display:flex}
.topbar-back svg{width:22px;height:22px;fill:var(--gold2)}
.user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(240,192,64,.3);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.chip-name{color:var(--gold2);font-size:11px;font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role-badge{background:var(--gold2);color:var(--navy);font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
#s-login{background:var(--navy)}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px}
.login-logo-img{width:160px;height:160px;border-radius:20px;object-fit:cover;margin-bottom:16px}
.login-card{background:var(--white);border-radius:var(--radius);padding:24px;width:100%;max-width:380px}
.field-label{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px;display:block}
.field-input{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:12px 14px;font-size:15px;color:var(--text);background:var(--white);outline:none;transition:border .2s;margin-bottom:14px}
.field-input:focus{border-color:var(--navy2)}
.login-btn{width:100%;background:var(--navy);color:var(--gold2);border:none;border-radius:var(--rsm);padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:18px;font-weight:500}
.login-msg{color:var(--muted);font-size:13px;margin-top:8px;text-align:center;min-height:18px}
.search-box{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px}
.search-row{display:flex;gap:10px;align-items:center}
.search-input-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-input{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:11px 36px 11px 13px;font-size:15px;color:var(--text);background:var(--light);outline:none}
.search-input:focus{border-color:var(--navy2);background:var(--white)}
.clear-btn{position:absolute;right:10px;background:none;border:none;cursor:pointer;padding:4px;display:none;align-items:center;justify-content:center}
.clear-btn.visible{display:flex}
.clear-btn svg{width:16px;height:16px;fill:var(--muted)}
.scan-btn{background:var(--navy);border:none;border-radius:var(--rsm);padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--gold2);font-size:13px;font-weight:600;flex-shrink:0}
.scan-btn svg{width:18px;height:18px;fill:var(--gold2)}
.search-hint{font-size:12px;color:var(--muted);margin-top:8px}
.sbar{background:var(--white);border-radius:var(--rsm);border:1px solid var(--border);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;min-height:40px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sdot.loading{background:var(--gold3);animation:pulse 1s infinite}
.sdot.ok{background:var(--green)}
.sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.result-count{font-size:13px;color:var(--muted);margin-bottom:10px;padding:0 2px}
.list-item{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;cursor:pointer;margin-bottom:10px;transition:border-color .15s}
.list-item:active{border-color:var(--navy2);background:#f0f4fb}
.list-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.lthumb{width:46px;height:46px;border-radius:8px;background:#f0f4fa;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.lthumb svg{width:24px;height:24px;fill:#c0cce0}
.lthumb img{width:46px;height:46px;object-fit:contain;border-radius:8px}
.lname{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:2px;line-height:1.3}
.lsku{font-size:11px;color:var(--muted)}
.lchev{width:16px;height:16px;fill:var(--border);flex-shrink:0;margin-left:auto}
.exact-badge{display:inline-block;background:#e0f0e8;color:var(--green);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.list-price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-top:1px solid var(--light);padding-top:10px}
.lpc{background:var(--light);border-radius:6px;padding:7px 6px;text-align:center}
.lpc:first-child{background:var(--navy)}
.lpl{font-size:9px;color:var(--muted);margin-bottom:3px;font-weight:600;text-transform:uppercase}
.lpc:first-child .lpl{color:rgba(240,192,64,.8)}
.lpv{font-size:13px;font-weight:700;color:var(--navy)}
.lpc:first-child .lpv{color:var(--gold2)}
.list-stock-row{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:8px}
.stock-label{font-size:11px;color:var(--muted)}
.stock-num{font-size:13px;font-weight:600;color:var(--navy)}
.result-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.result-img{width:100%;height:200px;object-fit:contain;background:#f0f4fa;border-bottom:1px solid var(--border);display:block}
.result-img-ph{width:100%;height:130px;background:#f0f4fa;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.result-img-ph svg{width:52px;height:52px;fill:#c0cce0}
.result-body{padding:18px}
.result-name{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:2px;line-height:1.3}
.result-short{font-size:13px;color:var(--muted);margin-bottom:4px}
.result-sku{font-size:12px;color:var(--muted);margin-bottom:10px}
.result-cat{display:inline-block;background:#e8edf8;color:var(--navy2);font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;margin-right:4px;margin-bottom:4px}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px;display:flex;align-items:center;gap:6px}
.section-title svg{width:14px;height:14px;flex-shrink:0}
.price-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px}
.price-table th{background:var(--navy);color:var(--gold2);padding:8px 6px;text-align:center;font-size:10px;font-weight:600}
.price-table th:first-child{text-align:left;border-radius:var(--rsm) 0 0 0;padding-left:10px}
.price-table th:last-child{border-radius:0 var(--rsm) 0 0}
.price-table td{padding:9px 6px;border-bottom:1px solid var(--light);text-align:center;color:var(--navy);font-weight:500}
.price-table td:first-child{text-align:left;color:var(--muted);font-weight:400;font-size:11px;padding-left:10px}
.price-table tr:last-child td{border-bottom:none}
.price-table tr:nth-child(even) td{background:#f8faff}
.cc00-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px}
.cc00-table th{background:#8a4a00;color:var(--white);padding:8px 6px;text-align:center;font-size:10px;font-weight:600}
.cc00-table th:first-child{text-align:left;border-radius:var(--rsm) 0 0 0;padding-left:10px}
.cc00-table th:last-child{border-radius:0 var(--rsm) 0 0}
.cc00-table td{padding:9px 6px;border-bottom:1px solid #fff4e8;text-align:center;color:#8a4a00;font-weight:600}
.cc00-table td:first-child{text-align:left;color:var(--muted);font-weight:400;font-size:11px;padding-left:10px}
.cc00-table tr:last-child td{border-bottom:none}
.lock-box{background:#fff4e8;border:1px solid #e8a020;border-radius:var(--rsm);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.lock-box svg{width:22px;height:22px;fill:#e8a020;flex-shrink:0}
.lock-text{font-size:13px;color:#8a4a00;font-weight:500}
.lock-sub{font-size:11px;color:#b87030;margin-top:2px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--light)}
.info-row:last-child{border-bottom:none}
.ik{font-size:13px;color:var(--muted);flex-shrink:0;margin-right:12px}
.iv{font-size:13px;font-weight:500;color:var(--navy);text-align:right;word-break:break-all}
.iv.mono{font-family:monospace;font-size:12px}
.scanner-wrap{background:var(--navy3);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;position:relative}
.scan-video{width:100%;height:280px;object-fit:cover;display:block;background:#000}
.scanner-canvas{display:none}
.scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scanner-frame{width:240px;height:120px;border:2.5px solid var(--gold2);border-radius:12px;position:relative}
.scanner-line{position:absolute;left:10px;right:10px;height:2px;background:var(--gold2);opacity:.85;animation:scanline 1.5s linear infinite}
@keyframes scanline{0%{top:8px}100%{top:108px}}
.scan-corner{position:absolute;width:18px;height:18px;border-color:var(--gold2);border-style:solid;border-width:0}
.sc-tl{top:-2px;left:-2px;border-top-width:3px;border-left-width:3px;border-top-left-radius:4px}
.sc-tr{top:-2px;right:-2px;border-top-width:3px;border-right-width:3px;border-top-right-radius:4px}
.sc-bl{bottom:-2px;left:-2px;border-bottom-width:3px;border-left-width:3px;border-bottom-left-radius:4px}
.sc-br{bottom:-2px;right:-2px;border-bottom-width:3px;border-right-width:3px;border-bottom-right-radius:4px}
.scanner-hint{background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:10px;text-align:center;font-size:13px;color:var(--muted)}
.stop-btn{background:var(--red);color:var(--white);border:none;border-radius:var(--rsm);padding:13px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px}
.manual-row{display:flex;gap:8px;margin-bottom:12px}
.manual-input{flex:1;border:1.5px solid var(--border);border-radius:var(--rsm);padding:11px 13px;font-size:15px;outline:none;background:var(--white);color:var(--text)}
.manual-btn{background:var(--navy);color:var(--gold2);border:none;border-radius:var(--rsm);padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer}
.logout-row{display:flex;justify-content:center;padding:8px 0 20px}
.logout-btn{background:none;border:1px solid var(--border);border-radius:var(--rsm);padding:8px 24px;font-size:13px;color:var(--muted);cursor:pointer}
</style>
</head>

<script>
const CONFIG={
  PROD_SHEET_ID:"1bi5igVC65g5ksjgzeWOOytc_-fXJ9q6-yBjkbBh8gFw",
  USER_SHEET_ID:"1sOqszajMR4KS5tWxfElnV-80Y9DsGJo_vBPwQopkgX4",
  PROD_TAB:"สินค้า",USER_TAB:"users",
  ROLE_RESTRICTED:5,SESSION_KEY:"rattana_v7_session"
};
const BC_COLS=["CODE EA","CODE PA","CODE BP","CODE CS"];
const SEARCH_COLS=["PRODUCT NAME","SHORT NAME","DESCRIPTION","CODE EA","CODE PA","CODE BP","CODE CS","CAT BU","CAT TYPE","CAT GROUP","CAT BRAND","CAT SIZE","CAT VENDOR","VENDOR CODE","VENDOR NAME"];
let allData=[],currentUser=null,zxingReader=null,scannerActive=false,lastScanned="";

function gviz(id,tab){return`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;}
async function fetchSheet(id,tab){
  const r=await fetch(gviz(id,tab));const t=await r.text();
  const j=JSON.parse(t.replace(/^[^(]+\(/,"").replace(/\);?\s*$/,""));
  const cols=j.table.cols.map(c=>c.label);
  return j.table.rows.map(row=>{const o={};cols.forEach((h,i)=>{o[h]=(row.c&&row.c[i]&&row.c[i].v!==null)?String(row.c[i].v).trim():"";});return o;});
}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function setStat(msg,state){document.getElementById("sdot").className="sdot"+(state?" "+state:"");document.getElementById("stext").textContent=msg;}
function fmtPrice(v){if(!v||v==="")return"—";const n=parseFloat(v);return isNaN(n)?"—":n.toLocaleString("th-TH");}
function fmtStock(v){if(!v||v==="")return"—";const n=parseInt(v);return isNaN(n)?"—":n.toLocaleString("th-TH");}
function saveSession(u){try{localStorage.setItem(CONFIG.SESSION_KEY,JSON.stringify(u));}catch(e){}}
function loadSession(){try{return JSON.parse(localStorage.getItem(CONFIG.SESSION_KEY));}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem(CONFIG.SESSION_KEY);}catch(e){}}
function updateChips(){
  const n=currentUser?currentUser.name:"";const r=currentUser?"Role "+currentUser.role:"";
  ["chip-name","dchip-name"].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=n;});
  ["chip-role","dchip-role"].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=r;});
}
async function doLogin(){
  const username=document.getElementById("inp-user").value.trim();
  const password=document.getElementById("inp-pw").value;
  document.getElementById("login-err").textContent="";
  if(!username||!password){document.getElementById("login-err").textContent="กรุณากรอก Username และ Password";return;}
  document.getElementById("login-msg").textContent="กำลังตรวจสอบ...";
  document.getElementById("login-btn").disabled=true;
  try{
    const users=await fetchSheet(CONFIG.USER_SHEET_ID,CONFIG.USER_TAB);
    const matched=users.find(u=>u["username"]===username&&u["password"]===password);
    if(!matched){document.getElementById("login-err").textContent="Username หรือ Password ไม่ถูกต้อง";document.getElementById("login-msg").textContent="";document.getElementById("login-btn").disabled=false;return;}
    currentUser={username:matched["username"],name:matched["ชื่อ"]||matched["name"]||matched["username"],role:parseInt(matched["role"])||1};
    saveSession(currentUser);document.getElementById("login-msg").textContent="";document.getElementById("login-btn").disabled=false;enterApp();
  }catch(e){document.getElementById("login-err").textContent="เชื่อมต่อไม่ได้ — ตรวจสอบสิทธิ์ Sheet";document.getElementById("login-msg").textContent="";document.getElementById("login-btn").disabled=false;}
}
async function enterApp(){
  updateChips();show("s-main");setStat("กำลังโหลดข้อมูลสินค้า...","loading");
  try{
    const rows=await fetchSheet(CONFIG.PROD_SHEET_ID,CONFIG.PROD_TAB);
    allData=rows.filter(r=>r["PRODUCT NAME"]||BC_COLS.some(k=>r[k]));
    setStat("โหลดสำเร็จ — พบ "+allData.length.toLocaleString("th-TH")+" รายการ","ok");
  }catch(e){setStat("โหลดข้อมูลไม่สำเร็จ — ตรวจสอบสิทธิ์ Sheet","err");}
}
function doLogout(){clearSession();currentUser=null;allData=[];document.getElementById("inp-user").value="";document.getElementById("inp-pw").value="";clearSearch();show("s-login");}
(function boot(){const saved=loadSession();if(saved&&saved.username&&saved.role){currentUser=saved;enterApp();}})();
document.getElementById("login-btn").onclick=doLogin;
document.getElementById("inp-pw").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
document.getElementById("inp-user").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("inp-pw").focus();});
document.getElementById("logout-btn").onclick=doLogout;
document.getElementById("detail-back").onclick=()=>show("s-main");
document.getElementById("scanner-back").onclick=()=>{stopScan();show("s-main");};
document.getElementById("stop-scan").onclick=()=>{stopScan();show("s-main");};
document.getElementById("open-scanner").onclick=()=>{show("s-scanner");startScan();};
document.getElementById("manual-search-btn").onclick=()=>{const v=document.getElementById("manual-bc").value.trim();if(v){stopScan();onScanFound(v);}};
document.getElementById("manual-bc").addEventListener("keydown",e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v){stopScan();onScanFound(v);}}});
function clearSearch(){document.getElementById("search-input").value="";document.getElementById("clear-btn").classList.remove("visible");document.getElementById("results-area").innerHTML="";setStat("พร้อมค้นหา","");}
let searchTimer;
document.getElementById("search-input").addEventListener("input",function(){
  const val=this.value;document.getElementById("clear-btn").classList.toggle("visible",val.length>0);
  clearTimeout(searchTimer);searchTimer=setTimeout(()=>doSearch(val),300);
});
function scoreResult(r,q){
  const fields=SEARCH_COLS.map(k=>(r[k]||"").toLowerCase());
  const name=(r["PRODUCT NAME"]||"").toLowerCase();
  const short=(r["SHORT NAME"]||"").toLowerCase();
  const codes=BC_COLS.map(k=>(r[k]||"").toLowerCase());
  if(codes.some(b=>b===q))return 100;
  if(codes.some(b=>b.endsWith(q)))return 80;
  if(name===q||short===q)return 70;
  if(name.startsWith(q)||short.startsWith(q))return 60;
  if(name.includes(q)||short.includes(q))return 50;
  if(codes.some(b=>b.includes(q)))return 40;
  if(fields.some(f=>f.includes(q)))return 20;
  return 0;
}
function isExactBarcodeMatch(r,q){return BC_COLS.some(k=>(r[k]||"").trim()===q.trim());}
function doSearch(raw){
  if(!raw.trim()){clearSearch();return;}
  const q=raw.trim().toLowerCase();
  const looksLikeBarcode=/^\d{4,}$/.test(raw.trim());
  const scored=allData.map(r=>({r,score:scoreResult(r,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  if(!scored.length){setStat("ไม่พบสินค้าที่ค้นหา","err");document.getElementById("results-area").innerHTML="<div class=\"sbar\"><div class=\"sdot err\"></div>&nbsp;ไม่พบสินค้าที่ค้นหา</div>";return;}
  if(looksLikeBarcode&&isExactBarcodeMatch(scored[0].r,raw.trim())){
    const exact=scored.filter(x=>isExactBarcodeMatch(x.r,raw.trim()));
    if(exact.length===1){setStat("พบ: "+exact[0].r["PRODUCT NAME"],"ok");showDetail(exact[0].r);return;}
  }
  setStat("พบ "+scored.length+" รายการ — กดเพื่อเลือกสินค้า","ok");
  renderList(scored.map(x=>x.r),q);
}
const NOIMG=`<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>`;
function getImg(r){
  const u=r["รูปสินค้า"]||r["IMAGE"]||r["image"]||"";if(!u)return null;
  const m1=u.match(/\/d\/([a-zA-Z0-9_-]+)/);if(m1)return`https://drive.google.com/uc?export=view&id=${m1[1]}`;
  const m2=u.match(/id=([a-zA-Z0-9_-]+)/);if(m2)return`https://drive.google.com/uc?export=view&id=${m2[1]}`;
  return u;
}
function renderList(results,q){
  const area=document.getElementById("results-area");
  if(!results.length){area.innerHTML="<div class=\"sbar\"><div class=\"sdot err\"></div>&nbsp;ไม่พบสินค้าที่ค้นหา</div>";return;}
  let html=`<div class="result-count">พบ ${results.length} รายการ — กดเพื่อเลือกสินค้า</div>`;
  results.slice(0,100).forEach(r=>{
    const img=getImg(r);
    const thumb=img?`<img src="${img}" style="width:46px;height:46px;border-radius:8px;object-fit:contain" onerror="this.style.display=\'none\'">`:NOIMG;
    const idx=allData.indexOf(r);
    const cat=[r["CAT GROUP"],r["CAT BRAND"]].filter(Boolean).join(" · ");
    const isExact=q&&BC_COLS.some(k=>(r[k]||"").toLowerCase()===q);
    const badge=isExact?"<span class=\"exact-badge\">ตรงทุกหลัก</span>":"";
    html+=`<div class="list-item" onclick="showDetail(allData[${idx}])">
      <div class="list-top">
        <div class="lthumb">${thumb}</div>
        <div style="flex:1;min-width:0">
          <div class="lname">${r["PRODUCT NAME"]||"—"}${badge}</div>
          <div class="lsku">${r["CODE EA"]?"CODE EA: "+r["CODE EA"]:""}${cat?" · "+cat:""}</div>
        </div>
        <svg class="lchev" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </div>
      <div class="list-price-grid">
        <div class="lpc"><div class="lpl">EA</div><div class="lpv">${fmtPrice(r["PRICE CC03 EA"])}</div></div>
        <div class="lpc"><div class="lpl">PA</div><div class="lpv">${fmtPrice(r["PRICE CC03 PA"])}</div></div>
        <div class="lpc"><div class="lpl">BP</div><div class="lpv">${fmtPrice(r["PRICE CC03 BP"])}</div></div>
        <div class="lpc"><div class="lpl">CS</div><div class="lpv">${fmtPrice(r["PRICE CC03 CS"])}</div></div>
      </div>
      <div class="list-stock-row"><span class="stock-label">สต็อก C4:</span><span class="stock-num">${fmtStock(r["STOCK C4"])}</span></div>
    </div>`;
  });
  area.innerHTML=html;
}
function showDetail(r){
  const canSeeCC00=currentUser&&currentUser.role>=CONFIG.ROLE_RESTRICTED;
  const img=getImg(r);
  const imgHtml=img?`<img src="${img}" class="result-img" onerror="this.outerHTML=\'<div class=result-img-ph>${NOIMG}</div>\'">`:`<div class="result-img-ph">${NOIMG}</div>`;
  const cats=[r["CAT BU"],r["CAT TYPE"],r["CAT GROUP"],r["CAT BRAND"],r["CAT SIZE"]].filter(Boolean);
  const units=[
    {u:"EA (ชิ้น)",code:r["CODE EA"],rattana:r["RATTANA UNIT EA"],unit:r["UNIT EA"],qty:r["QTY EA"]},
    {u:"PA (แพ็ก)",code:r["CODE PA"],rattana:r["RATTANA UNIT PA"],unit:r["UNIT PA"],qty:r["QTY PA"]},
    {u:"BP (แพ็กใหญ่)",code:r["CODE BP"],rattana:r["RATTANA UNIT BP"],unit:r["UNIT BP"],qty:r["QTY BP"]},
    {u:"CS (ลัง)",code:r["CODE CS"],rattana:r["RATTANA UNIT CS"],unit:r["UNIT CS"],qty:r["QTY CS"]},
  ].filter(x=>x.code||x.rattana||x.unit);
  const unitRows=units.map(x=>`<tr><td>${x.u}</td><td>${x.rattana||"—"}</td><td>${x.unit||"—"}</td><td>${x.qty||"—"}</td><td style="font-family:monospace;font-size:11px">${x.code||"—"}</td></tr>`).join("")||"<tr><td colspan=\"5\" style=\"text-align:center;color:var(--muted)\">—</td></tr>";
  const priceRows=[
    {l:"ปลีก (CC03)",ea:r["PRICE CC03 EA"],pa:r["PRICE CC03 PA"],bp:r["PRICE CC03 BP"],cs:r["PRICE CC03 CS"]},
    {l:"10 ลัง (CC02)",ea:r["PRICE CC02 EA"],pa:r["PRICE CC02 PA"],bp:r["PRICE CC02 BP"],cs:r["PRICE CC02 CS"]},
    {l:"พาเลท (CC01)",ea:r["PRICE CC01 EA"],pa:r["PRICE CC01 PA"],bp:r["PRICE CC01 BP"],cs:r["PRICE CC01 CS"]},
  ].map(p=>`<tr><td>${p.l}</td><td>${fmtPrice(p.ea)}</td><td>${fmtPrice(p.pa)}</td><td>${fmtPrice(p.bp)}</td><td>${fmtPrice(p.cs)}</td></tr>`).join("");
  const cc00Block=canSeeCC00
    ?`<div class="section-title" style="color:#8a4a00"><svg style="fill:#d4700a" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>ราคาควบคุม CC00 (Role ${CONFIG.ROLE_RESTRICTED}+)</div>
      <table class="cc00-table"><tr><th>ระดับ</th><th>EA (ชิ้น)</th><th>PA (แพ็ก)</th><th>BP (แพ็กใหญ่)</th><th>CS (ลัง)</th></tr>
      <tr><td>CC00</td><td>${fmtPrice(r["PRICE CC00 EA"])}</td><td>${fmtPrice(r["PRICE CC00 PA"])}</td><td>${fmtPrice(r["PRICE CC00 BP"])}</td><td>${fmtPrice(r["PRICE CC00 CS"])}</td></tr></table>`
    :`<div class="lock-box"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg><div><div class="lock-text">ราคาควบคุม (CC00)</div><div class="lock-sub">ต้องการ Role ${CONFIG.ROLE_RESTRICTED} ขึ้นไป</div></div></div>`;
  document.getElementById("dtitle").textContent=r["PRODUCT NAME"]||"รายละเอียดสินค้า";
  document.getElementById("dsku").textContent=r["SHORT NAME"]||"";
  document.getElementById("detail-content").innerHTML=`
    <div class="result-card">
      ${imgHtml}
      <div class="result-body">
        <div class="result-name">${r["PRODUCT NAME"]||"—"}</div>
        ${r["SHORT NAME"]?`<div class="result-short">${r["SHORT NAME"]}</div>`:""}
        ${r["DESCRIPTION"]?`<div class="result-sku">${r["DESCRIPTION"]}</div>`:""}
        <div style="margin-bottom:8px">${cats.map(c=>`<span class="result-cat">${c}</span>`).join("")}</div>
        <div class="section-title">ราคาขาย</div>
        <table class="price-table">
          <tr><th>ระดับ</th><th>EA (ชิ้น)</th><th>PA (แพ็ก)</th><th>BP (แพ็กใหญ่)</th><th>CS (ลัง)</th></tr>
          ${priceRows}
        </table>
        ${cc00Block}
        <div class="section-title">สต็อกและข้อมูล</div>
        <div class="info-row"><span class="ik">สต็อก C4</span><span class="iv">${fmtStock(r["STOCK C4"])}</span></div>
        <div class="info-row"><span class="ik">สต็อก W4</span><span class="iv">${fmtStock(r["STOCK W4"])}</span></div>
        <div class="info-row"><span class="ik">เฉลี่ย 3 เดือน</span><span class="iv">${r["AVERAGE 3MONTH"]||"—"}</span></div>
        <div class="info-row"><span class="ik">Rank C4</span><span class="iv">${r["RANK C4"]||"—"}</span></div>
        <div class="info-row"><span class="ik">Location</span><span class="iv">${r["Location"]||"—"}</span></div>
        <div class="info-row"><span class="ik">Vendor</span><span class="iv">${r["VENDOR NAME"]||"—"}</span></div>
        <div class="info-row"><span class="ik">Vendor Code</span><span class="iv mono">${r["VENDOR CODE"]||"—"}</span></div>
        <div class="info-row"><span class="ik">SKU Life</span><span class="iv">${r["SKU LIFE (DAYS)"]?r["SKU LIFE (DAYS)"]+" วัน":"—"}</span></div>
        <div class="info-row"><span class="ik">CS/Pallet</span><span class="iv">${r["CS PALLET"]||"—"}</span></div>
        <div class="info-row"><span class="ik">Layers</span><span class="iv">${r["NUMBER OF LAYERS"]||"—"} (${r["CS LAYER"]||"—"} CS/Layer)</span></div>
        ${r["FIRST STOCK DATE"]?`<div class="info-row"><span class="ik">First Stock</span><span class="iv">${r["FIRST STOCK DATE"]}</span></div>`:""}
        <div class="section-title">หน่วยและบาร์โค้ด</div>
        <table class="price-table">
          <tr><th>หน่วย</th><th>ชื่อรัตนา</th><th>Unit</th><th>Qty</th><th>Code</th></tr>
          ${unitRows}
        </table>
      </div>
    </div>`;
  show("s-detail");
}
function startScan(){
  document.getElementById("scan-txt").textContent="กำลังเปิดกล้อง...";
  document.getElementById("scan-dot").className="sdot loading";
  lastScanned="";scannerActive=true;
  if(typeof ZXing==="undefined"){document.getElementById("scan-txt").textContent="โหลดไลบรารีไม่ได้ — ใช้ช่องพิมพ์ด้านล่าง";document.getElementById("scan-dot").className="sdot err";return;}
  try{
    const hints=new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
      ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.ITF,ZXing.BarcodeFormat.QR_CODE,
    ]);
    zxingReader=new ZXing.BrowserMultiFormatReader(hints,150);
    const video=document.getElementById("scan-video");
    const canvas=document.getElementById("scan-canvas");
    const ctx=canvas.getContext("2d");
    zxingReader.decodeFromVideoDevice(null,video,(result,err)=>{
      if(!scannerActive)return;
      if(result){
        const code=result.getText();
        if(code&&code!==lastScanned){lastScanned=code;onScanFound(code);}
      }
    });
    document.getElementById("scan-txt").textContent="กล้องพร้อม — วางบาร์โค้ดในกรอบสีทอง";
    document.getElementById("scan-dot").className="sdot ok";
  }catch(e){
    const msg=e.name==="NotAllowedError"?"กรุณาอนุญาตกล้อง: Settings → Safari → Camera → Allow":"เปิดกล้องไม่ได้ — ลองพิมพ์บาร์โค้ดด้านล่าง";
    document.getElementById("scan-txt").textContent=msg;document.getElementById("scan-dot").className="sdot err";
  }
}
function stopScan(){
  scannerActive=false;
  if(zxingReader){try{zxingReader.reset();}catch(e){}zxingReader=null;}
  const video=document.getElementById("scan-video");
  if(video&&video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null;}
  document.getElementById("manual-bc").value="";
}
function onScanFound(code){
  stopScan();show("s-main");
  document.getElementById("search-input").value=code;
  document.getElementById("clear-btn").classList.add("visible");
  setStat("สแกนได้: "+code+" — กำลังค้นหา...","loading");
  const exact=allData.filter(r=>BC_COLS.some(k=>r[k]&&r[k].trim()===code.trim()));
  if(exact.length===1){setStat("พบ: "+exact[0]["PRODUCT NAME"],"ok");showDetail(exact[0]);}
  else if(exact.length>1){setStat("พบ "+exact.length+" รายการ — กรุณาเลือก","ok");renderList(exact,code.toLowerCase());}
  else{setStat("ไม่พบบาร์โค้ด "+code+" ในระบบ","err");document.getElementById("results-area").innerHTML=`<div class="sbar"><div class="sdot err"></div>&nbsp;ไม่พบบาร์โค้ด ${code} ในระบบ</div>`;}
}
</script>
